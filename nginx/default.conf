# Landing page - served on port 80 as default server
# Cloudflare Tunnel routes fiserhub.fun here
# LAN users access via rpi.local or rpi
server {
    listen 80 default_server;
    server_name rpi.local rpi fiserhub.fun;

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="en">
<head>
    <title>FiserHub</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 500px; width: 90%; text-align: center; }
        h1 { font-size: 2.2rem; color: #f8fafc; margin-bottom: 0.3rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.3rem;
            margin: 0.75rem 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.2s ease;
        }
        a:hover { background: #334155; border-color: #3b82f6; transform: translateY(-1px); }
        .icon { font-size: 1.6rem; width: 40px; text-align: center; }
        .info { text-align: left; }
        .name { font-size: 1.1rem; font-weight: 600; color: #f8fafc; }
        .desc { font-size: 0.8rem; color: #94a3b8; margin-top: 0.15rem; }
        footer { margin-top: 2rem; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FiserHub</h1>
        <p class="subtitle">Home Automation</p>
        <a id="openhab" href="https://openhab.fiserhub.fun">
            <span class="icon">&#x1f3e0;</span>
            <div class="info"><div class="name">OpenHAB</div><div class="desc">Home automation control</div></div>
        </a>
        <a id="zigbee" href="https://zigbee.fiserhub.fun">
            <span class="icon">&#x1f4e1;</span>
            <div class="info"><div class="name">Zigbee2MQTT</div><div class="desc">Zigbee device management</div></div>
        </a>
        <a id="grafana" href="https://grafana.fiserhub.fun">
            <span class="icon">&#x1f4ca;</span>
            <div class="info"><div class="name">Grafana</div><div class="desc">Metrics and dashboards</div></div>
        </a>
        <a id="influxdb" href="http://influxdb.home">
            <span class="icon">&#x1f5c4;</span>
            <div class="info"><div class="name">InfluxDB</div><div class="desc">Time-series database</div></div>
        </a>
        <a id="panel" href="http://panel.home">
            <span class="icon">&#x1f4df;</span>
            <div class="info"><div class="name">HRV Panel</div><div class="desc">ESP32 display</div></div>
        </a>
        <footer>homeHAB &middot; Cloudflare Tunnel</footer>
    </div>
    <script>
        // Use .home domains when accessed from LAN
        if (location.hostname.endsWith(".home") || location.hostname === "rpi.local" || location.hostname === "rpi") {
            document.getElementById("openhab").href = "http://openhab.home";
            document.getElementById("zigbee").href = "http://zigbee.home";
            document.getElementById("grafana").href = "http://grafana.home";
        }
    </script>
</body>
</html>';
    }
}
