# Reverse proxy for LAN access via .home domains
# Requires EdgeRouter DNS: openhab.home, zigbee.home, grafana.home, influxdb.home → RPi IP

# OpenHAB
server {
    listen 80;
    server_name openhab.home;

    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Zigbee2MQTT
server {
    listen 80;
    server_name zigbee.home;

    location / {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Grafana
server {
    listen 80;
    server_name grafana.home;

    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
    }
}

# InfluxDB
server {
    listen 80;
    server_name influxdb.home;

    location / {
        proxy_pass http://127.0.0.1:8086/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
