# homeHAB Docker Compose
# Uses .env.dev or .env.prod configuration (via .env symlink)
#
# Dev:  docker compose --profile dev up -d
# Prod: docker compose --profile prod up -d
#
# Shared services (no profile): mosquitto, influxdb, grafana, renderer
# Dev-only: openhab, mqtt-simulator
# Prod-only: cloudflared, zigbee2mqtt

services:

  # === OpenHAB (dev only - prod runs natively via OpenHABian) ===

  openhab:
    container_name: ${COMPOSE_PROJECT_NAME}-server
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    image: homehab-openhab:5.0.0-jdk
    restart: unless-stopped
    ports:
      - "8888:8080"
      - "8889:8443"
    group_add:
      - tty
    volumes:
      - /etc/localtime:/etc/localtime
      - /etc/timezone:/etc/timezone
      - $OPENHAB_CONF/ssh:/openhab/.ssh
      - $OPENHAB_ADDONS:/openhab/addons
      - $OPENHAB_CONF:/openhab/conf
      - $OPENHAB_USERDATA:/openhab/userdata
    environment:
      - CRYPTO_POLICY=  # Disabled - Temurin JDK 21 uses unlimited by default
      - EXTRA_JAVA_OPTS=${EXTRA_JAVA_OPTS}
      - JAVA_HOME=/usr/lib/jvm/temurin-21-jdk-arm64
      - PATH=/usr/lib/jvm/temurin-21-jdk-arm64/bin:$PATH
    extra_hosts:
      - "zigbee.home:192.168.1.132"
      - "openhab.home:192.168.1.132"
      - "grafana.home:192.168.1.132"
      - "rpi.local:192.168.1.132"

  # === Optional: Local MQTT Simulator ===
  # Use for testing edge cases (smoke alarm, high CO2) without real hardware
  # Requires changing mqtt.things: host="mosquitto" instead of host="zigbee.home"

  mosquitto:
    container_name: ${COMPOSE_PROJECT_NAME}-mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MOSQUITTO_PORT:-1883}:1883"
    volumes:
      - ${MOSQUITTO_CONFIG:-./mosquitto/config/mosquitto.conf}:/mosquitto/config/mosquitto.conf:ro
      - ${MOSQUITTO_DATA:-./mosquitto/data}:/mosquitto/data
      - ${MOSQUITTO_LOG:-./mosquitto/log}:/mosquitto/log

  # === Metrics & Visualization ===

  influxdb:
    container_name: ${COMPOSE_PROJECT_NAME}-influxdb
    image: influxdb:2
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - ${INFLUXDB_DATA:-./influxdb/data}:/var/lib/influxdb2
      - ${INFLUXDB_CONFIG:-./influxdb/config}:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=homehab
      - DOCKER_INFLUXDB_INIT_BUCKET=openhab

  grafana:
    container_name: ${COMPOSE_PROJECT_NAME}-grafana
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    restart: unless-stopped
    user: "${GRAFANA_USER:-472}"
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - ${GRAFANA_DATA:-./grafana/data}:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - influxdb
      - renderer

  renderer:
    container_name: ${COMPOSE_PROJECT_NAME}-renderer
    image: grafana/grafana-image-renderer:latest
    restart: unless-stopped
    environment:
      - ENABLE_METRICS=false

  # === Nginx reverse proxy + landing page (production only) ===

  nginx:
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    image: nginx:stable-alpine
    restart: unless-stopped
    profiles: ["prod"]
    network_mode: host
    volumes:
      - ${NGINX_SITES:-./nginx}:/etc/nginx/conf.d:ro

  # === Zigbee2MQTT (production only) ===

  zigbee2mqtt:
    container_name: ${COMPOSE_PROJECT_NAME}-zigbee2mqtt
    image: koenkk/zigbee2mqtt:${Z2M_VERSION:-latest}
    restart: unless-stopped
    profiles: ["prod"]
    privileged: true
    ports:
      - "${Z2M_PORT:-8081}:8081"
    volumes:
      - ${Z2M_DATA:-/opt/zigbee2mqtt/data}:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - ${Z2M_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Europe/Prague

  # === Optional: Local MQTT Simulator ===

  mqtt-simulator:
    container_name: ${COMPOSE_PROJECT_NAME}-mqtt-simulator
    profiles: ["dev"]
    build:
      context: ./mqtt-simulator
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./mqtt-simulator/devices.yaml:/app/devices.yaml
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883

  # === Production: Cloudflare Tunnel ===
  # Remote access to services via fiserhub.fun
  # Requires: cloudflared tunnel login + tunnel create (see docs/CLOUDFLARE-TUNNEL.md)

  cloudflared:
    container_name: homehab-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["prod"]
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare/config.yml:/etc/cloudflared/config.yml:ro
      - ~/.cloudflared:/home/nonroot/.cloudflared:ro
    network_mode: host
