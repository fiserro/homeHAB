; PlatformIO configuration for ESP32-C3 SCT013 Current Sensor
;
; Build:        pio run
; Upload USB:   pio run -t upload
; Upload OTA:   pio run -e ota -t upload
; Monitor:      pio device monitor

[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.cdc_on_boot = 1

lib_deps =
    knolleary/PubSubClient@^2.8

build_flags =
    ; Override WiFi/MQTT credentials via secrets.h or uncomment below:
    ; -DWIFI_SSID=\"MyNetwork\"
    ; -DWIFI_PASSWORD=\"MyPassword\"
    ; -DMQTT_BROKER=\"zigbee.home\"

; USB upload (default)
[env:esp32c3]

; OTA upload: pio run -e ota -t upload
[env:ota]
upload_protocol = espota
upload_port = homehab-sct013.local
